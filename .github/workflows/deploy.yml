name: Multi-Job Workflow

on:
  push:
    branches:
      - main

jobs:
  check-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML file exists
        run: test -f index.html

  validate-html:
    runs-on: ubuntu-latest
    needs: check-file
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML tag
        run: grep -q "<html>" index.html

  deploy-preview:
    runs-on: ubuntu-latest
    needs: validate-html
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print deployment message
        run: echo "Single HTML page is ready for deployment"
