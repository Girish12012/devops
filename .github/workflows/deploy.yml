name: Security and Access

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secure-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify token availability
        run: echo "Access token loaded successfully"

        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}